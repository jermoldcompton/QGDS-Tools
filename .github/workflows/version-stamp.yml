name: Version stamp on push

on:
  push:
    branches: [main]
    paths:
      - 'QGDS-Scales.html'

permissions:
  contents: write

jobs:
  stamp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Stamp version
        run: |
          VERSION=$(date -u +"%y%m%d%H")
          sed -i -E "s|Preview: https://jermoldcompton\.github\.io/QGDS-Tools/QGDS-Scales\.html(\?v=[0-9]+)?|Preview: https://jermoldcompton.github.io/QGDS-Tools/QGDS-Scales.html?v=$VERSION|g" "QGDS-Scales.html"

      - name: Commit version stamp
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add QGDS-Scales.html
          git diff --staged --quiet || git commit -m "chore: version stamp ?v=$(date -u +"%y%m%d%H")"
          git push
